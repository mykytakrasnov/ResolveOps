name: resolveops

services:
  postgres:
    image: postgres:16.10-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resolveops}
      POSTGRES_USER: ${POSTGRES_USER:-resolveops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resolveops}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-resolveops}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-resolveops-local-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-resolveops}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-resolveops-local-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-resolveops-local}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc anonymous set private "local/$${MINIO_BUCKET}"
    restart: "no"

volumes:
  postgres-data:
  minio-data:
