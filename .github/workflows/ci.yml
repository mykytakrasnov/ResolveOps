name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test Worker contracts
        run: pnpm test

  python:
    name: Python checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.10-alpine
        env:
          POSTGRES_DB: resolveops_test
          POSTGRES_USER: resolveops
          POSTGRES_PASSWORD: resolveops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resolveops -d resolveops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL_TEST: postgresql://resolveops:resolveops@localhost:5432/resolveops_test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.31"
          enable-cache: true
          cache-dependency-glob: services/agent-api/uv.lock
      - name: Install Python dependencies
        run: uv sync --directory services/agent-api --frozen
      - name: Check formatting
        run: uv run --directory services/agent-api ruff format --check src tests migrations
      - name: Lint
        run: uv run --directory services/agent-api ruff check src tests migrations
      - name: Typecheck
        run: uv run --directory services/agent-api mypy src tests
      - name: Check generated contracts
        run: PYTHONPATH="$PWD/services/agent-api/src" uv run --project services/agent-api python -m resolveops.models.contract_generation --check --repository-root "$PWD"
      - name: Test
        run: uv run --directory services/agent-api pytest
